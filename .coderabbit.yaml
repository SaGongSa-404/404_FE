    instructions: "Riverpod StateNotifier 또는 Notifier 패턴을 사용해야 합니다. Widget 관련 코드가 있으면 지적해주세요."
  - path: "lib/core/**"
    instructions: "핵심 인프라 코드입니다. 변경 시 다른 기능에 영향을 줄 수 있으니 꼼꼼히 리뷰해주세요."

