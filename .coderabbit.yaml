# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: ko-KR

reviews:
  collapse_walkthrough: true
  high_level_summary: true
  review_status: true
  poem: false
  request_changes_workflow: false

  # 요약 형식 지침
  instructions: |
    PR 요약은 반드시 아래 형식을 엄격히 지켜서 작성하세요:
    - 변경 사항을 '새로운 기능', '스타일 및 테마', '개선 사항', '버그 수정' 등의 카테고리로 분류할 것.
    - 각 항목은 불렛 포인트(*)를 사용하여 명확하게 나열할 것.
    - 불필요한 서술형 문장은 제외하고 핵심 내용만 전달할 것.

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - develop
      - main

  path_filters:
    - "!**/*.g.dart"
    - "!**/*.freezed.dart"

  path_instructions:
    - path: "lib/core/**"
      instructions: "인프라·공용 기반 코드입니다. 다른 기능에 미치는 영향을 중심으로 리뷰해주세요."
    - path: "lib/shared/**"
      instructions: "기능 간 공용 위젯·모델입니다. 특정 feature 전용 로직이 섞이지 않았는지, 재사용 관점에서 봐주세요."
    - path: "lib/features/**/views/**"
      instructions: "UI(위젯)만 두세요. 비즈니스 로직이나 직접적인 API 호출이 있으면 지적해주세요."
    - path: "lib/features/**/viewmodels/**"
      instructions: "상태·로직(Riverpod Notifier/Provider 등)만 두세요. Widget이 섞이면 지적해주세요."

chat:
  auto_reply: true
